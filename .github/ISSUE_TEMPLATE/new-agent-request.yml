name: 新代理请求
description: 建议添加到 The Agency 的新代理
labels: ["enhancement", "new-agent"]
body:
  - type: input
    id: agent-name
    attributes:
      label: 代理名称
      placeholder: 例如 数据库工程师
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 类别
      options:
        - engineering
        - design
        - marketing
        - product
        - project-management
        - testing
        - support
        - spatial-computing
        - specialized
        - strategy
        - 新类别（请在下方描述）
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 这个代理会做什么？
      placeholder: 描述代理的专业领域、何时使用以及它填补什么空白。
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: 示例用例
      placeholder: 提供 2-3 个该代理有用的真实场景。
    validations:
      required: false